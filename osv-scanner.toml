# OSV-Scanner configuration.
# https://google.github.io/osv-scanner/configuration/
#
# This file lives at repo root so the CI workflow picks it up
# automatically via `osv-scanner scan source --recursive ./`.

# ----------------------------------------------------------------------------
# Vulnerability suppressions (documented exceptions)
# ----------------------------------------------------------------------------

[[IgnoredVulns]]
id = "GHSA-w8v5-vhqr-4h9v"
# Affects diskcache 5.6.3 (transitive dep of pysigma via the SigmaHQ
# rule-cache integration). No fixed version published upstream as of
# this commit. The advisory describes a deserialization weakness via
# pickle-loaded cache entries. We do NOT load untrusted cache data —
# pysigma's diskcache use is local-only on the runner with attacker-
# controllable input not reaching the cache path.
#
# Review schedule: every Patch Tuesday issue includes a check on this
# suppression. When diskcache publishes a fix, drop this entry and
# bump the transitive pin in requirements-ci.txt.
ignoreUntil = 2026-09-07     # 90 days from suppression date
reason = "No fix available; pysigma's diskcache use is not attacker-reachable in our CI context. Re-review at the next quarter."
