# zizmor configuration — controls what counts as a finding.
# https://docs.zizmor.sh/configuration/

rules:
  # SHA-pinning is tracked as a separate work item — see "SHA-pin all
  # third-party Actions" in TODO.md. Dependabot is configured to keep
  # SHA pins current once we adopt them. Until then, suppress
  # blanket unpinned-uses noise.
  unpinned-uses:
    config:
      policies:
        "*": ref-pin
        # The actions/* and github/* org actions are first-party and
        # accept tag pins as policy-compliant.
        "actions/*": any
        "github/*": any

  # Exclude the GitHub-managed CodeQL default-setup workflow from
  # zizmor entirely. It's regenerated by GitHub and shouldn't be
  # hand-edited; findings there are out-of-scope for us to fix.
  artipacked:
    ignore:
      - codeql.yml
