version: 2

updates:
  # Keep GitHub Actions versions current — would have caught the
  # lycheeverse/lychee-action v1 advisory before a human did.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "13:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope
    # Group routine version-bumps so a normal Monday produces ONE PR
    # instead of 5+. Security advisories still open their own dedicated
    # PRs (Dependabot honors the `applies-to` distinction).
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"

  # CI Python deps — pysigma, zizmor. Tracked in requirements-ci.txt at
  # repo root so Dependabot can monitor the version constraints.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "13:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "ci"
      include: scope
    groups:
      pip-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      pip-security:
        applies-to: security-updates
        patterns:
          - "*"
