name: Auto-sync TODO

# Regenerates the BEGIN AUTO / END AUTO marked sections of TODO.md from
# what's actually on disk. Runs on push to main (commits the updated file
# back if it changed) and on every PR as a check (fails if the PR's TODO.md
# is out of sync with the files in the PR).

on:
  push:
    branches: [main]
    paths:
      - 'detections/**'
      - 'blue-team-playbooks/**'
      - 'detection-workflows/**'
      - 'vulnerabilities/**'
      - 'threat-intelligence/**'
      - 'purple-team-labs/**'
      - 'scripts/sync-todo.py'
      - 'TODO.md'
  pull_request:
    paths:
      - 'detections/**'
      - 'blue-team-playbooks/**'
      - 'detection-workflows/**'
      - 'vulnerabilities/**'
      - 'threat-intelligence/**'
      - 'purple-team-labs/**'
      - 'scripts/sync-todo.py'
      - 'TODO.md'
  workflow_dispatch:

concurrency:
  # Scheduled / long-running. Don't cancel mid-execution — a partial run is
  # worse than waiting for the previous run to finish.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check sync (PRs)
        if: github.event_name == 'pull_request'
        run: python scripts/sync-todo.py --check

      - name: Sync and commit (pushes to main)
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          python scripts/sync-todo.py
          if [ -z "$(git status --porcelain TODO.md)" ]; then
            echo "TODO.md already in sync."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TODO.md
          git commit -m "chore: auto-sync TODO.md [skip ci]"
          # Push with rebase-on-conflict retry. If another commit lands
          # on main between our commit and our push (Dependabot merge,
          # another auto-sync run on a fresh push, etc.), pull --rebase
          # and try again. Cap at 3 attempts to avoid an infinite loop
          # on persistent conflicts (which would indicate a real merge
          # problem that needs a human).
          for attempt in 1 2 3; do
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push attempt ${attempt} failed — rebasing and retrying."
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}" || {
              echo "::error::Rebase conflict on auto-sync — manual intervention needed."
              exit 1
            }
          done
          echo "::error::Push failed after 3 attempts."
          exit 1
