# gitleaks — secret scanning across the commit graph.
#
# Complements GitHub's native secret scanning (which only matches a fixed
# set of provider tokens) by catching:
#   - generic high-entropy strings (API keys without provider prefixes)
#   - secrets in markdown content (the bulk of this repo), which native
#     scanning historically under-flags compared to source code
#   - secrets in YAML / KQL / Sigma rules, where a fake-looking placeholder
#     can shadow a real token (e.g., AccessToken="<paste-here>")
#   - history additions inside a PR (full commit-range scan), not just the
#     latest tree
#
# On PRs: scan only the new commits (fast, ~5s).
# On push to main + weekly schedule: scan full history (catches anything
# that slipped past PR scans before the workflow existed).
#
# Why both this and dependency-review + zizmor: those tools find vulnerable
# *third-party* code. This finds *first-party* mistakes (accidentally
# committed AccessKey, Defender API token, Discord webhook, etc.). Different
# failure mode, different tool.
#
# Custom rules + allowlist live in .gitleaks.toml at repo root. Edit there
# to suppress known-false-positives (e.g., example tokens in
# detections/sigma/_template.yml).

name: Secret scan (gitleaks)

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '47 13 * * 1'    # Mondays 13:47 UTC, after Scorecard
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo-and-containers: true

      - uses: actions/checkout@v6
        with:
          # Full history so gitleaks can scan the whole graph on push/schedule.
          # PRs scan only the PR commits, which gitleaks-action handles by
          # default when fetch-depth: 0.
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Config file at repo root. Without this gitleaks falls back to
          # its built-in defaults (which are reasonable but don't know about
          # our placeholder patterns in template files).
          GITLEAKS_CONFIG: .gitleaks.toml

  notify-on-failure:
    needs: gitleaks
    if: failure() && github.event_name != 'pull_request'
    uses: ./.github/workflows/_notify-failure.yml
    with:
      workflow: ${{ github.workflow }}
    secrets:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
