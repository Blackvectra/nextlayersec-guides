name: Lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo-and-containers: true

      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !node_modules

  sigma-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo-and-containers: true

      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pySigma
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Validate Sigma rules
        run: python detections/sigma/validate_rules.py

  yara-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          # Cannot disable-sudo here — this job needs `sudo apt-get install -y yara`
          # because there's no pre-built YARA action on the marketplace we trust.
          disable-sudo: false

      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install YARA
        run: sudo apt-get update && sudo apt-get install -y yara
      - name: Validate YARA rules
        run: |
          set -euo pipefail
          shopt -s nullglob
          fail=0
          for rule in detections/yara/*.yar detections/yara/*.yara; do
            base=$(basename "$rule")
            if [[ "$base" == _* ]]; then
              echo "SKIP $rule (template)"
              continue
            fi
            if yara --fail-on-warnings "$rule" /etc/hostname >/dev/null 2>yara_err.log; then
              echo "OK   $rule"
            else
              echo "FAIL $rule:"; sed 's/^/  /' yara_err.log
              fail=1
            fi
          done
          # Templates: parse-only check so a broken template still fails CI
          for rule in detections/yara/_*.yar detections/yara/_*.yara; do
            if yara "$rule" /etc/hostname >/dev/null 2>yara_err.log; then
              echo "OK   $rule (template parse)"
            else
              echo "FAIL $rule (template):"; sed 's/^/  /' yara_err.log
              fail=1
            fi
          done
          exit $fail

  typos:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo-and-containers: true

      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Spell check
        # Pinned to v1 (latest released v1.x). DO NOT use @master — that's a
        # moving target that runs any commit pushed to the branch tip.
        uses: crate-ci/typos@v1
        with:
          config: ./.typos.toml

  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo-and-containers: true

      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-mail
            --accept 200,206,429
            './**/*.md'
          fail: false

  zizmor:
    # zizmor is a GitHub Actions YAML linter. Catches:
    #  - script injection via ${{ }} in `run:` blocks
    #  - permissions: write-all / overly broad defaults
    #  - misuse of pull_request_target with checkout of untrusted refs
    #  - unpinned third-party actions
    #  - dangerous use of github.event.pull_request.head.* in run blocks
    # https://woodruffw.github.io/zizmor/
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo-and-containers: true

      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install zizmor
        run: pip install -r requirements-ci.txt
      - name: Run zizmor
        run: |
          # Triaged audit. Config in .github/zizmor.yml suppresses tag-pin
          # noise (tracked separately by the SHA-pin TODO item) and the
          # GitHub-managed codeql.yml file. Build fails on medium+ findings.
          # SARIF still uploaded so all findings (including suppressed
          # low-severity informationals) appear in code-scanning.
          #
          # zizmor exits 0 (clean) or 1 (findings). Treat both as
          # success for SARIF generation; any other exit code means the
          # tool itself crashed and should surface as a CI failure.
          sarif_rc=0
          zizmor --config .github/zizmor.yml --format sarif .github/workflows/ > zizmor.sarif || sarif_rc=$?
          if [ "$sarif_rc" -gt 1 ]; then
            echo "::error::zizmor crashed during SARIF generation (exit code $sarif_rc)"
            exit "$sarif_rc"
          fi
          zizmor --config .github/zizmor.yml --min-severity=medium --format plain --no-online-audits .github/workflows/
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: zizmor.sarif
          category: zizmor

  dependency-review:
    # Runs only on PRs — flags newly-introduced vulnerable dependencies
    # (including in GitHub Actions, since dependency-review@v4 covers them).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write    # post the summary comment
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo-and-containers: true

      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@v5
        with:
          comment-summary-in-pr: on-failure
          fail-on-severity: high

  # Push-to-main / scheduled failures ping Discord. PR failures are
  # already visible on the PR (and would expose the webhook on forks),
  # so the reusable workflow's caller filters with github.event_name.
  notify-on-failure:
    needs: [markdownlint, sigma-validate, yara-validate, typos, linkcheck, zizmor]
    if: failure() && github.event_name != 'pull_request'
    uses: ./.github/workflows/_notify-failure.yml
    with:
      workflow: ${{ github.workflow }}
    secrets:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
