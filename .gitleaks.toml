# gitleaks configuration for nextlayersec-guides.
#
# We extend gitleaks' default ruleset (don't replace it) and add a small
# allowlist for the placeholder tokens that legitimately appear in our
# templates and detection rules.
#
# Editing this file requires running `gitleaks detect --config .gitleaks.toml`
# locally to confirm the allowlist still matches.

# Inherit gitleaks' built-in default rules. Without this you'd be running
# with ONLY the custom rules below — losing AWS keys / GitHub tokens /
# Slack webhooks / etc. detection.
[extend]
useDefault = true

# ----------------------------------------------------------------------------
# Custom rules — patterns specific to this repo / its tenants
# ----------------------------------------------------------------------------

[[rules]]
id = "discord-webhook"
description = "Discord webhook URL (committed by mistake)"
regex = '''https://(?:ptb\.|canary\.)?discord(?:app)?\.com/api/webhooks/[0-9]+/[A-Za-z0-9_-]{60,}'''
tags = ["webhook", "discord"]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''sk-ant-(?:api|admin)[0-9]{2}-[A-Za-z0-9_-]{80,}'''
tags = ["key", "anthropic"]

# Note: an Entra application-client-secret rule was considered but removed
# because (a) the regex shape `[A-Za-z0-9~._-]{34,40}(?=["'\s])` requires a
# lookahead, which gitleaks' RE2 engine doesn't support, and (b) without
# a lookahead the rule false-positives heavily on base64 placeholders in
# detection-content templates. GitHub native secret scanning + push
# protection covers Entra client secrets directly via Microsoft's
# partner-program patterns, so this gap is closed at the platform layer.
#
# IMPORTANT: this assumes GitHub push protection is ENABLED for the repo.
# Verify at Settings → Code security and analysis → Secret scanning →
# Push protection. If it's disabled, an Entra client secret could be
# committed and would only be caught by this CI run after the fact.
# Full settings runbook: docs/github-settings.md section 1.

[[rules]]
id = "defender-mde-bearer"
description = "Defender for Endpoint API bearer token (JWT-shaped)"
regex = '''eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIsIng1dCI[A-Za-z0-9_-]{200,}'''
tags = ["token", "defender", "azure"]

# ----------------------------------------------------------------------------
# Allowlist — things that look like secrets but are not
# ----------------------------------------------------------------------------
[allowlist]
description = "Repo-wide allowlist: template placeholders + documentation examples"

# Paths where we expect placeholder tokens (sigma/yara templates, example
# command outputs in playbooks, etc.).
paths = [
  '''detections/sigma/_template\.ya?ml''',
  '''detections/yara/_template\.yara?''',
  '''vulnerabilities/template\.md''',
  '''blue-team-playbooks/_template\.md''',
  '''hardening/_template\.md''',
  '''threat-intelligence/.*/_template\.md''',
  # gitleaks itself lives here so its own examples shouldn't self-flag.
  '''\.gitleaks\.toml''',
]

# Common placeholder strings we use in examples and template files.
regexes = [
  '''<paste[^>]*>''',
  '''<your[- ][^>]+>''',
  '''<insert[^>]+>''',
  '''AAAA{16,}''',                     # padding placeholders in examples
  '''xxx+''',                          # explicit redactions in playbook excerpts
  '''REPLACE[_-]ME''',
  '''EXAMPLE[_-]ONLY''',
  '''sk-ant-api03-EXAMPLE''',          # documented Anthropic example shape
  '''https://discord\.com/api/webhooks/EXAMPLE''',
]

# Specific commits where a false-positive landed historically (none yet).
# commits = []
