# Configuration for crate-ci/typos — runs in CI via .github/workflows/lint.yml
# https://github.com/crate-ci/typos

[default]
# Run on the whole repo by default.
extend-ignore-re = [
    # Hex / base64 / hashes / IDs in detection content shouldn't be spell-checked.
    "\\b[A-Fa-f0-9]{8,}\\b",
    # CVE / KB / MITRE IDs.
    "\\bCVE-[0-9]{4}-[0-9]+\\b",
    "\\bKB[0-9]+\\b",
    "\\bT[0-9]{4}(\\.[0-9]{3})?\\b",
    # Sigma rule UUIDs.
    "\\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\\b",
    # Vendor / product names that contain English-looking substrings the
    # spell-checker mis-flags (e.g. MOVEit → "Eit").
    "\\bMOVEit\\b",
    # Deliberate misspellings used to illustrate attacker typo-squat
    # domains in phishing / AiTM TTP write-ups. These are not real typos
    # in our prose, they're examples of how attackers spell things.
    "\\bmicrosft\\b",
    "\\bmlcrosoft\\b",
    "\\boktaa\\b",
    "\\bgoogie\\b",
    # Windows CLI format-output flag (`schtasks /fo csv`, `wevtutil /fo xml`).
    "(?:^|\\s)/fo\\b",
    # Security / industry acronyms that the spell-checker mis-parses as
    # mistyped English words. SIEMs (typos sub-word-parses to "SIE"),
    # OT (Operational Technology — flagged as TO/OF), SEO (proactive),
    # SCCM, SCEP, OCSP all fit the same pattern.
    "\\bSIEMs?\\b",
    "\\bOT\\b",
    "\\bSEO\\b",
    "\\bSCCM\\b",
    "\\bSCEP\\b",
    "\\bOCSP\\b",
    # File extensions referenced literally in docs / .gitignore prose:
    # `.ot` / `.OT` / `.seo` (per maintainer request, see .gitignore).
    # The leading dot anchors these to file-extension context only —
    # bare "ot" in prose still gets caught as a typo.
    "`\\.(?:ot|OT|seo|SEO)`",
]

[default.extend-words]
# Security-domain words that look like typos to typos but aren't.
mke = "mke"          # appears in some path strings
nd  = "nd"           # used as abbreviation in tables
ba  = "ba"           # appears in encoded strings / examples
te  = "te"           # appears as TE acronym
hsa = "hsa"          # appears in HSA acronym contexts
TABL = "TABL"        # Microsoft Tenant Allow/Block List (anti-phishing content)

[default.extend-identifiers]
# Function / variable names that the spell-checker should leave alone.

[files]
# Skip generated content and binary-ish blobs.
extend-exclude = [
    "TODO.md",            # contains autogenerated sections + acronyms
    "**/*.kql",           # KQL queries — strings inside are intentionally non-English
    "**/*.spl",           # Splunk SPL
    "**/*.yar",           # YARA — hex / base64 / pattern strings
    "**/*.yara",
    "node_modules/**",
    ".git/**",
]
