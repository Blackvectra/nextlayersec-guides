title: PowerShell Encoded Command Execution
id: 56bd01e1-658e-4430-baa7-4b7530e6c5b9
status: experimental
description: >-
  Detects PowerShell launches that pass a base64-encoded payload via
  -EncodedCommand (or its -enc / -ec aliases) or that decode an inline blob with
  FromBase64String. This is a frequent obfuscation pattern for loaders,
  droppers, and post-exploitation frameworks.
author: nextlayersec
date: 2026/05/28
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://github.com/nextlayersec/nextlayersec-guides/blob/main/detections/kql/T1059.001_powershell-encoded-command.md
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '-enc'
      - '-EncodedCommand'
      - '-ec '
      - 'FromBase64String'
  condition: selection
falsepositives:
  - Configuration tools (SCCM, Intune, Chocolatey, vendor agents) that legitimately run encoded payloads
  - Internal automation pipelines on build or jump hosts
level: medium
