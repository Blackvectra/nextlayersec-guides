title: Entra ID Password Spray — Failed Sign-ins (base)
name: entra_failed_signin_codes
id: 6088206e-7c78-437e-87bc-fee51ab4b551
status: experimental
description: >-
  Base rule that matches Entra ID interactive sign-in failures whose ResultType
  is a known credential-failure code (bad password, account locked, strong-auth
  required, etc.). On its own this is noisy; it feeds the password-spray
  correlation rule below.
author: nextlayersec
date: 2026/05/28
references:
  - https://attack.mitre.org/techniques/T1110/003/
  - https://github.com/nextlayersec/nextlayersec-guides/blob/main/detections/kql/T1110.003_entra-password-spray.md
tags:
  - attack.credential_access
  - attack.t1110.003
logsource:
  product: azure
  service: signinlogs
detection:
  selection:
    ResultType:
      - 50053
      - 50055
      - 50056
      - 50057
      - 50064
      - 50074
      - 50076
      - 50079
      - 50125
      - 50126
      - 50129
      - 50133
      - 50140
      - 50158
      - 50173
      - 50199
      - 50034
  condition: selection
falsepositives:
  - Misconfigured on-prem sync agents bombing Entra after a password change
  - Load-testing or vendor IAM tooling
level: high
---
title: Entra ID Password Spray — Single IP, Many Users
id: fbf53dbe-47f0-40e1-9976-3387ae563f14
status: experimental
description: >-
  Fires when a single source IP produces failed sign-ins against ten or more
  distinct user principals within one hour — the signature of a password spray.
author: nextlayersec
date: 2026/05/28
references:
  - https://attack.mitre.org/techniques/T1110/003/
  - https://github.com/nextlayersec/nextlayersec-guides/blob/main/detections/kql/T1110.003_entra-password-spray.md
tags:
  - attack.credential_access
  - attack.t1110.003
correlation:
  type: value_count
  rules:
    - entra_failed_signin_codes
  group-by:
    - IpAddress
  timespan: 1h
  condition:
    gte: 10
    field: UserPrincipalName
falsepositives:
  - NAT egress from a large office (many users behind one IP) hitting MFA after a policy change
  - Allowlist known service-principal source IP ranges or raise the distinct-user threshold
level: high
