title: Delivered inbound email carrying an attachment (base)
name: m365_delivered_inbound_with_attachment
id: b4df2d9a-4963-48e0-a69b-8a3bfe7a767d
status: experimental
description: >-
  Base rule for inbound Microsoft 365 mail that was delivered (not blocked or
  quarantined) and carried at least one attachment. On its own this is high
  volume; it feeds the correlation below that pairs it with an embedded link to
  a credential harvester on abused free hosting.
author: nextlayersec
date: 2026/06/04
references:
  - https://attack.mitre.org/techniques/T1566/001/
  - https://github.com/Blackvectra/nextlayersec-guides/blob/main/detections/kql/T1566.001_attachment-link-credential-harvester.md
tags:
  - attack.initial_access
  - attack.t1566.001
logsource:
  product: m365
  service: threat_management
detection:
  selection:
    EmailDirection: Inbound
    DeliveryAction: Delivered
  filter_no_attachment:
    AttachmentCount: 0
  condition: selection and not filter_no_attachment
falsepositives:
  - Normal business mail with attachments — this base rule is intentionally broad
level: informational
---
title: Email link to credential harvester on abused free hosting (base)
name: m365_email_url_abused_hosting
id: a364f8c2-aa83-4678-b6a6-85d4090ab356
status: experimental
description: >-
  Base rule for URLs extracted from M365 mail whose host is free / trusted-SaaS
  infrastructure repeatedly abused to host credential harvesters (Google Sites,
  Firebase, Azure Blob, *.pages.dev, etc.). Noisy alone; feeds the correlation.
author: nextlayersec
date: 2026/06/04
references:
  - https://attack.mitre.org/techniques/T1656/
  - https://github.com/Blackvectra/nextlayersec-guides/blob/main/detections/kql/T1566.001_attachment-link-credential-harvester.md
tags:
  - attack.initial_access
  - attack.t1566.001
logsource:
  product: m365
  service: threat_management
detection:
  selection:
    UrlDomain|endswith:
      - 'sites.google.com'
      - 'script.google.com'
      - 'storage.googleapis.com'
      - 'firebasestorage.googleapis.com'
      - 'web.app'
      - 'firebaseapp.com'
      - 'blob.core.windows.net'
      - 'r2.dev'
      - 'pages.dev'
      - 'workers.dev'
      - 'weebly.com'
      - 'wixsite.com'
      - 'glitch.me'
      - 'netlify.app'
      - 'vercel.app'
      - 'notion.site'
      - 'duckdns.org'
  condition: selection
falsepositives:
  - Legitimate senders that genuinely host files on these platforms
  - Marketing redirects that land on netlify.app / vercel.app
level: low
---
title: Delivered phish — attachment plus credential-harvester link on abused hosting
id: 0d378618-eb9a-48b7-8e8a-f4e0dd65cec5
status: experimental
description: >-
  Fires when the same message (NetworkMessageId) is both a delivered inbound
  email carrying an attachment AND contains a link to a credential harvester on
  abused free hosting — the attachment-borne credential phish that bypassed
  filtering. A representative pattern is a password-protected PDF from a lookalike
  domain with a sites.google.com/view harvester. Promote to High when sender
  authentication is weak (SPF none/fail, DMARC bestguesspass) or the sender
  domain is a lookalike of a protected brand.
author: nextlayersec
date: 2026/06/04
references:
  - https://attack.mitre.org/techniques/T1566/001/
  - https://attack.mitre.org/techniques/T1204/002/
  - https://attack.mitre.org/techniques/T1656/
  - https://github.com/Blackvectra/nextlayersec-guides/blob/main/detections/kql/T1566.001_attachment-link-credential-harvester.md
  - https://github.com/Blackvectra/nextlayersec-guides/blob/main/blue-team-playbooks/phishing-email-triage.md
tags:
  - attack.initial_access
  - attack.t1566.001
  - attack.execution
  - attack.t1204.002
correlation:
  type: temporal
  rules:
    - m365_delivered_inbound_with_attachment
    - m365_email_url_abused_hosting
  group-by:
    - NetworkMessageId
  timespan: 5m
falsepositives:
  - Legitimate attachment mail that also links to a file on Google Drive / Firebase
  - Newsletters using free static hosting for landing pages
level: high
