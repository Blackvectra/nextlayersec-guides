# MkDocs configuration — NextLayerSec Guides docs site.
#
# Published at https://docs.nls-assessment.app (custom domain, CNAME
# in /docs-static/CNAME → blackvectra.github.io). Built and deployed
# by .github/workflows/docs-deploy.yml on every push to main.
#
# We can't point docs_dir at the repo root directly (MkDocs forbids
# docs_dir being the config-file parent). Instead `scripts/build-docs.sh`
# copies the markdown / static content into `_docs/` first and mkdocs
# builds from there. The source-of-truth markdown files stay where
# readers expect them on GitHub; we just have to maintain an explicit
# `nav:` block here.

site_name: NextLayerSec Guides
site_description: >-
  Blue-team playbooks, detection workflows, hardening baselines, and
  threat-intelligence documentation for SOC teams, MSPs, and students.
site_url: https://docs.nls-assessment.app/
site_author: NextLayerSec
repo_name: Blackvectra/nextlayersec-guides
repo_url: https://github.com/Blackvectra/nextlayersec-guides
edit_uri: edit/main/
copyright: >-
  &copy; NextLayerSec — content licensed MIT.
  Find anything wrong? Open an issue or PR.

# Source layout — content lives at the repo root, but MkDocs can't
# use the config-file parent as docs_dir, so `scripts/build-docs.sh`
# copies the markdown content into `_docs/` first (plain find+cp, no
# rsync dependency). See scripts/build-docs.sh for the local-dev
# convenience wrapper and .github/workflows/docs-deploy.yml for the
# CI build step.
docs_dir: _docs

# Files / directories that should NOT be copied into the build source.
# scripts/build-docs.sh enforces these excludes via its find filter;
# this list is also what gets gitignored.
exclude_docs: |
  /.github/
  /.git/
  /.venv/
  /node_modules/
  /scripts/
  /requirements-ci.txt
  /requirements-docs.txt
  /osv-scanner.toml
  /mkdocs.yml
  /package.json
  /package-lock.json
  /.markdownlint*
  /.typos.toml
  /.gitleaks.toml
  /.gitignore
  /.editorconfig
  /TODO.md

# Allow validate_content.py to enforce internal-link integrity;
# MkDocs strict mode would otherwise reject the relative-path links
# that GitHub renders fine but MkDocs needs to massage.
strict: false

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view
  palette:
    - scheme: default
      primary: black
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  font:
    text: Inter
    code: JetBrains Mono

# Plugins. Keep the list minimal — every added plugin is a new
# dependency to maintain.
plugins:
  - search:
      separator: '[\s\-\.\_]+'
  - awesome-pages:
      collapse_single_pages: true
      strict: false

# Markdown extensions for the security-content patterns we use
# (admonitions for "non-negotiable" callouts, code blocks with line
# numbers + copy, tables, mermaid diagrams, footnotes).
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - footnotes
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
      title: On this page
  - attr_list
  - md_in_html
  - def_list
  - abbr

